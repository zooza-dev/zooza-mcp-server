      cz: ["smazat registraci", "zrušit registraci", "stornovat", "storno", "smazat kurz", "koš", "obnovit"]
    clarification: >
      When a customer says 'vymazať' (SK) or 'smazat' (CZ), always clarify which action
      they mean: Cancel (deactivate registration), Archive (deactivate programme/class),
      or Delete/Trash (move to Trash). These have different consequences and different
      locations in the UI. See the trash-and-restore guide for the full comparison.
    public: true

