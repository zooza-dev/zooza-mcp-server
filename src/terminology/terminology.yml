# Zooza Terminology Dictionary — DERIVED COPY (committed fallback)
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║  DO NOT EDIT THIS FILE DIRECTLY.                                ║
# ║  Master: zooza-dev/sdd-workflow → translations/terminology.yml  ║
# ║  This copy is used when HELP_REPO_TOKEN is not set at build.    ║
# ║  To update: set HELP_REPO_TOKEN and run `npm run build`, or     ║
# ║  manually: cp ../sdd-workflow/translations/terminology.yml \    ║
# ║                 src/terminology/terminology.yml                  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# Last synced: 2026-05-26
#
# Fields per term:
#   id               - machine-readable slug (unique)
#   canonical_en     - the single correct English term
#   category         - grouping for the public glossary
#   definition       - plain-English definition (public)
#   context          - term variants by user role/domain
#   deprecated       - old/wrong terms to avoid
#   synonyms         - acceptable variants (do not use in new content, but understood)
#   translations     - per-language canonical translations
#   intent_keywords  - per-language list of what customers actually type/say (AI use)
#   do_not_confuse_with - disambiguation pairs with reason (AI use)
#   ai_notes         - additional AI-specific guidance
#   public           - true = include in public glossary page

terms:

  # ──────────────────────────────────────────────
  # PRODUCT HIERARCHY
  # ──────────────────────────────────────────────

  - id: programme
    canonical_en: "Programme"
    category: "product-hierarchy"
    definition: >
      The top-level container that defines an activity type. Holds pricing,
      payment settings, booking form configuration, and scheduling rules.
      One Programme can contain multiple Classes.
    context:
      admin: "Programme"
      client: "Class"
      widget: "Class"
    deprecated:
      - "Course"           # EN only — do not use in English content
      - "Open course"      # was used for pay-as-you-go type
      - "One-time course"  # was used for one-off event type
    synonyms:
      - "program"          # American spelling, acceptable
    translations:
      sk: "Program"        # correct SK market term — not deprecated
      cz: "Kurz"           # correct CZ market term — not deprecated
      ro: "Curs"           # correct RO market term — not deprecated
      hu: "Kurzus"         # correct HU market term — not deprecated
      de: "Programm / Kurs"
      pl: "Program"
      it: "Programma"
      fr: "Programme"
    intent_keywords:
      en: ["programme", "program", "course", "activity", "class programme"]
      sk: ["program", "kurz", "aktivita", "hodiny"]
      cz: ["kurz", "program", "aktivita"]
      ro: ["curs", "program", "activitate"]
      hu: ["kurzus", "program", "tanfolyam"]
      de: ["Programm", "Kurs", "Aktivität"]
    notes: >
      When domain = widget (client-facing), displayed as 'Class'.
      Admin always uses 'Programme'. Do not use 'Course' in new English content.
      'Kurz' (CZ), 'kurz' (SK), 'curs' (RO), 'kurzus' (HU) are the correct
      market-language equivalents — they are NOT deprecated in those languages.
      When a CZ/SK/RO/HU customer says 'kurz/curs/kurzus', they always mean Programme.
    public: true

  - id: class
    canonical_en: "Class"
    category: "product-hierarchy"
    definition: >
      A scheduled group within a Programme, typically differentiated by
      day/time, level, or location. Inherits all Programme settings automatically.
      One Class contains multiple Sessions.
    context:
      admin: "Class"
      client: "Class"
      widget: "Class"
    deprecated:
      - "Group"
      - "group"
      - "Timetable"   # old navigation label
      - "batch"
      - "track"
    synonyms:
      - "group"        # legacy; still understood
    translations:
      sk: "Skupina / Lekcia"
      cz: "Skupina / Lekce"
      de: "Gruppe / Kurs"
      ro: "Grupă"
      hu: "Csoport"
      pl: "Grupa"
      it: "Gruppo"
      fr: "Classe"
    intent_keywords:
      en: ["class", "group", "timetable", "schedule", "my class", "which group"]
      sk: ["skupina", "trieda", "hodina", "rozvrh", "hodiny"]
      de: ["Klasse", "Gruppe", "Kurs", "Stundenplan"]
      ro: ["grupă", "grupe"]
      hu: ["csoport"]
    notes: >
      'Class' is used at two levels: (1) the subdivision within a Programme (admin view),
      and (2) the top-level name for a Programme in the client/widget view.
      Context resolves the ambiguity. In admin, the hierarchy is Programme → Class → Session.
    public: true

  - id: session
    canonical_en: "Session"
    category: "product-hierarchy"
    definition: >
      A single scheduled meeting within a Class, with a specific date and time.
      Attendance is recorded at session level. In Zooza, the correct term is always
      'Session' — not 'lesson', 'date', 'lekcia', 'lekce', or 'hodina'.
    context:
      admin: "Session"
      client: "Session"
      widget: "Session"
    deprecated:
      - "slot"
      - "appointment"
      - "date"
      - "time slot"
    synonyms:
      - "lesson"        # common in education context
      - "class session" # acceptable disambiguator
    translations:
      sk: "Termín / Hodina / Lekcia"
      cz: "Termín / Hodina / Lekce"
      hu: "Óra / Foglalkozás"
      de: "Termin / Stunde / Einheit"
      ro: "Lecție"
      pl: "Termin / Zajęcia"
      it: "Sessione"
      fr: "Séance"
    intent_keywords:
      en: ["session", "lesson", "slot", "time", "date", "class date", "next session", "class time"]
      sk: ["termín", "hodina", "lekcia", "dátum", "čas", "hodiny", "vyučovanie"]
      cz: ["termín", "hodina", "lekce", "datum", "čas", "výuka", "hodiny"]
      hu: ["óra", "foglalkozás", "időpont", "tanóra"]
      de: ["Termin", "Stunde", "Einheit", "Datum"]
      ro: ["lecție", "lecții"]
    ai_notes: >
      Customers across all markets use 'hodina' (SK/CZ), 'lekcia' (SK), 'lekce' (CZ),
      'óra' (HU), 'lesson' (EN) to mean a single scheduled occurrence = Session in Zooza.
      Always translate these terms to 'Session' when answering or searching KB.
    public: true

  # ──────────────────────────────────────────────
  # PROGRAMME TYPES
  # ──────────────────────────────────────────────

  - id: pay-as-you-go
    canonical_en: "Pay-as-you-go"
    category: "programme-types"
    definition: >
      A flexible programme type where clients book and pay for individual sessions
      rather than committing to a full term. Often used for drop-in classes.
    context:
      admin: "Pay-as-you-go"
      client: "Pay-as-you-go"
      widget: "Pay-as-you-go"
    deprecated:
      - "Open course"
      - "Open registration"
      - "drop-in"
      - "flexible"
    synonyms:
      - "PAYG"
      - "per-session"
      - "drop-in"
    translations:
      sk: "Platba za termín / Otvorený kurz"
      cz: "Platba za termín / Otevřená registrace"
      de: "Pay-as-you-go / Einzelbuchung"
      pl: "Płatność za termin"
      ro: "Plata per sesiune"
      hu: "Alkalmi fizetés"
      it: "Pagamento a sessione"
      fr: "Paiement à la séance"
    intent_keywords:
      en: ["pay as you go", "drop in", "single session", "flexible", "per session", "no commitment"]
      sk: ["platba za termín", "jednotlivé termíny", "bez záväzkov", "drop-in"]
      de: ["einzeln", "flexibel", "ohne Bindung", "einzelne Stunde"]
    public: true

  - id: one-off-event
    canonical_en: "One-off Event"
    category: "programme-types"
    definition: >
      A single session on a specific date. No repeating schedule. Used for
      workshops, lectures, consultations, or special events.
    context:
      admin: "One-off Event"
      client: "One-off Event"
      widget: "One-off Event"
    deprecated:
      - "One-time course"
      - "Registration for one session"
      - "single session event"
      - "workshop course"
    synonyms:
      - "workshop"
      - "event"
      - "one-time event"
    translations:
      sk: "Jednorazová udalosť / Jednorazový kurz"
      cz: "Jednorázová událost / Jednorázový kurz"
      de: "Einzelveranstaltung / Einmaliger Kurs"
      pl: "Wydarzenie jednorazowe"
      ro: "Eveniment unic"
      hu: "Egyszeri esemény"
      it: "Evento singolo"
      fr: "Événement unique"
    intent_keywords:
      en: ["one off", "one-off", "single event", "workshop", "one time", "one session"]
      sk: ["jednorazovo", "jednorazový", "workshop", "prednáška", "konzultácia",
           "jednorazový kurz", "jednorazový program", "jednorazová udalosť",
           "voľné šantenie", "voľna hodina", "open day", "ukážková hodina"]
      cz: ["jednorázově", "jednorázový", "workshop", "přednáška", "konzultace", "jednorázový kurz"]
      de: ["einmalig", "Workshop", "Einzeltermin", "Veranstaltung"]
    public: true

  - id: membership
    canonical_en: "Membership"
    category: "programme-types"
    definition: >
      An ongoing programme with a recurring fixed charge and no fixed end date.
      Clients are billed on a regular cycle (monthly, quarterly, etc.).
    context:
      admin: "Membership"
      client: "Membership"
      widget: "Membership"
    synonyms:
      - "subscription"
      - "recurring membership"
    translations:
      sk: "Členstvo / Predplatné"
      cz: "Členství / Předplatné"
      de: "Mitgliedschaft / Abo"
      pl: "Członkostwo"
      ro: "Abonament"
      hu: "Tagság"
      it: "Abbonamento"
      fr: "Abonnement"
    intent_keywords:
      en: ["membership", "subscription", "monthly fee", "recurring", "ongoing"]
      sk: ["členstvo", "predplatné", "mesačný poplatok", "opakujúca sa platba"]
      de: ["Mitgliedschaft", "Abo", "monatlich", "Dauerauftrag"]
    public: true

  - id: 1-to-1-class
    canonical_en: "1-to-1 class"
    category: "programme-types"
    definition: >
      A class with a single attendee (individual/private lesson). Admin term
      for what clients call a Private class.
    context:
      admin: "1-to-1 class"
      client: "Private class"
      widget: "Private class"
    deprecated:
      - "Individual class"
      - "individual session"
      - "private lesson"
    synonyms:
      - "private class"
      - "individual lesson"
    translations:
      sk: "Individuálna hodina / Súkromná hodina"
      cz: "Individuální hodina / Soukromá hodina"
      de: "Einzelstunde / Privatstunde"
      pl: "Lekcja indywidualna"
      hu: "Egyéni óra"
      it: "Lezione individuale"
      fr: "Cours particulier"
    intent_keywords:
      en: ["1 to 1", "one to one", "private", "individual", "private class", "private lesson"]
      sk: ["individuálna hodina", "súkromná hodina", "individuálna lekcia", "privát"]
      de: ["Einzelstunde", "Privatstunde", "Einzelunterricht"]
    public: true

  # ──────────────────────────────────────────────
  # SCHEDULING
  # ──────────────────────────────────────────────

  - id: block
    canonical_en: "Block"
    category: "scheduling"
    definition: >
      A separately purchasable segment of sessions within a single Class.
      A Class is divided into Blocks when not all clients attend all sessions —
      for example, Mondays-only vs. Tuesdays-only vs. both days combined.
      Each Block has its own price and clients buy only the Block(s) they need.
    context:
      admin: "Block"
      client: "Block"
      widget: "Block"
    deprecated:
      - "segment"              # internal/API term — do not use in public content
      - "segmented schedule"   # internal/API term — do not use in public content
      - "schedule segment"     # internal/API term — do not use in public content
    synonyms:
      - "blok"                 # SK/CZ/HU market usage, acceptable
      - "term"                 # some operators use "term" for time-period blocks
    translations:
      sk: "Blok"
      cz: "Blok"
      de: "Block"
      hu: "Blokk"
      ro: "Bloc"
      pl: "Blok"
      it: "Blocco"
      fr: "Bloc"
    intent_keywords:
      en: ["block", "blocks", "block booking", "days block", "split sessions", "buy mondays only",
           "partial attendance", "selective sessions"]
      sk: ["blok", "bloky", "blokové hodiny", "blokovanie", "čiastočná dochádzka"]
    do_not_confuse_with:
      - term: "Session"
        reason: >
          A Session is a single occurrence (one meeting). A Block is a group
          of sessions sold together as one purchasable unit within a Class.
      - term: "Payment Plan"
        reason: >
          A Payment Plan controls how and when the client pays. A Block controls
          which sessions the client has access to. They are independent.
      - term: "Make-up session"
        reason: >
          Make-up sessions let a client replace a missed session. Blocks define
          which sessions the client is enrolled in to begin with.
    ai_notes: >
      Always use "Block" (not "segment" or "segmented schedule") in any public-facing
      content, help docs, or client communication. "Segmented schedule" and "segment"
      are internal API/spec terms only. When a spec references "segmented schedule",
      translate this to "Block" for help content. A Class with blocks is often
      described as a "block-based class".
    public: true

  # ──────────────────────────────────────────────
  # BOOKINGS & ENROLMENT
  # ──────────────────────────────────────────────

  - id: booking
    canonical_en: "Booking"
    category: "bookings"
    definition: >
      A client's formal commitment to attend a Class. Creates a payment obligation
      tied to one specific Class. Managed by admins.
    context:
      admin: "Booking"
      client: "Enrolment"
      widget: "Enrolment"
    deprecated:
      - "Registration"  # use Booking (admin) or Enrolment (client)
      - "sign-up"
      - "sign up"
      - "enrollment"    # American spelling; use Enrolment
    synonyms:
      - "enrolment"     # client-facing variant
      - "registration"  # legacy; still understood
    translations:
      sk: "Prihlásenie / Zápis"
      cz: "Přihlášení / Zápis"
      de: "Buchung / Anmeldung"
      pl: "Rezerwacja / Zapis"
      ro: "Rezervare"
      hu: "Foglalás"
      it: "Prenotazione"
      fr: "Réservation"
    intent_keywords:
      en: ["booking", "enrolment", "enrollment", "registration", "sign up", "sign me up", "book a spot"]
      sk: ["prihlásenie", "prihláška", "zápis", "registrácia", "prihlásiť"]
      de: ["Buchung", "Anmeldung", "einschreiben", "buchen", "anmelden"]
    do_not_confuse_with:
      - term: "Transfer"
        reason: "Transfer moves a booking to another class; Booking is the enrolment record itself"
      - term: "Copy"
        reason: "Copy duplicates a booking; the booking is the record being duplicated"
    ai_notes: >
      Transfer and Copy both apply to the Booking/Registration entity — not to the Client.
      If customer says 'move my child', clarify: 'Do you want to move the registration to another class?'
    public: true

  - id: enrolment
    canonical_en: "Enrolment"
    category: "bookings"
    definition: >
      The client-facing term for a Booking. Refers to the same record as Booking
      but used in the client portal and widget context.
    context:
      admin: "Booking"
      client: "Enrolment"
      widget: "Enrolment"
    deprecated:
      - "Registration"
      - "enrollment"  # American spelling
    synonyms:
      - "booking"     # admin-side equivalent
    translations:
      sk: "Zápis / Prihlásenie"
      cz: "Zápis / Přihlášení"
      de: "Anmeldung / Einschreibung"
      pl: "Zapis"
      ro: "Înscriere"
      hu: "Jelentkezés"
      it: "Iscrizione"
      fr: "Inscription"
    intent_keywords:
      en: ["enrolment", "enrollment", "my registration", "my booking"]
      sk: ["zápis", "prihlásenie"]
      de: ["Anmeldung", "Einschreibung"]
    notes: >
      Same underlying record as Booking. Use 'Enrolment' in client-facing content
      and widget documentation. Use 'Booking' in admin/operations documentation.
    public: true

  - id: transfer
    canonical_en: "Transfer"
    category: "bookings"
    definition: >
      Move a booking/registration from one Class, Group, or Programme to another.
      The original booking ends and a new booking is created in the target Class.
    context:
      admin: "Transfer"
      client: "Transfer"
      widget: null
    deprecated:
      - "move booking"
      - "switch group"
      - "change class"
      - "relocate"
    synonyms:
      - "move"
      - "switch"
    translations:
      sk: "Presunúť / Prehodiť"
      cz: "Přesunout"
      de: "Verschieben / Wechseln"
      pl: "Przenieść"
      ro: "Transfer"
      hu: "Áthelyezés"
      it: "Trasferimento"
      fr: "Transfert"
    intent_keywords:
      en: ["transfer", "move", "switch", "change group", "change class", "move to another", "switch class"]
      sk: ["presunúť", "prehodiť", "zmeniť skupinu", "presun", "premiestiť", "iná skupina"]
      de: ["verschieben", "wechseln", "umbuchen", "in andere Gruppe", "Gruppenänderung"]
      pl: ["przenieść", "zmienić grupę", "przeniesienie"]
      ro: ["mută", "schimbă grupa", "transfer"]
      hu: ["áthelyezni", "csoport csere"]
      it: ["spostare", "trasferire"]
      fr: ["déplacer", "transférer", "changer de groupe"]
    do_not_confuse_with:
      - term: "Copy"
        reason: "Transfer moves the booking (original ends); Copy duplicates it (original stays)"
    ai_notes: >
      If customer says: 'move', 'presunúť', 'prehodiť', 'zmeniť skupinu', 'verschieben', 'wechseln',
      'przenieść', 'mută', 'áthelyezni', 'spostare', 'déplacer' → treat as Transfer intent.
      Transfer applies to the Booking, not to the Client entity.
    public: true

  - id: copy
    canonical_en: "Copy"
    category: "bookings"
    definition: >
      Duplicate a booking/registration to another Class, Group, or Programme.
      The original booking remains unchanged. A new booking is created.
      Payment schedules do not carry over to the copy.
    context:
      admin: "Copy"
      client: null
      widget: null
    deprecated:
      - "duplicate booking"
      - "clone"
    synonyms:
      - "duplicate"
      - "clone"
    translations:
      sk: "Kopírovať / Zduplikovať"
      cz: "Kopírovat / Zduplikovat"
      de: "Kopieren / Duplizieren"
      pl: "Skopiować"
      ro: "Copiere"
      hu: "Másolás"
      it: "Copia"
      fr: "Copier"
    intent_keywords:
      en: ["copy", "duplicate", "clone", "also enrol in", "add to another class", "copy booking"]
      sk: ["kopírovať", "duplikovať", "zduplikovať", "skopírovať", "zaradiť aj do"]
      de: ["kopieren", "duplizieren", "auch einschreiben", "in weitere Gruppe"]
      pl: ["skopiować", "zduplikować"]
      ro: ["duplică", "copie", "copiere"]
      hu: ["másolni", "duplikálni"]
      it: ["duplicare", "copiare"]
      fr: ["copier", "dupliquer"]
    do_not_confuse_with:
      - term: "Transfer"
        reason: "Copy leaves the original booking in place; Transfer removes it"
    ai_notes: >
      If customer says: 'copy', 'kopírovať', 'duplikovať', 'zduplikovať', 'kopieren',
      'duplizieren', 'skopiować', 'duplică', 'másolni', 'duplicare', 'copier' → treat as Copy intent.
      Copy applies to the Booking, not to the Client entity.
      Note: payment schedules and make-up credits do NOT carry over to the copied booking.
    public: true

  - id: network-transfer
    canonical_en: "Network transfer"
    category: "bookings"
    definition: >
      Moving one or more client bookings from one company to another company
      within the same Zooza franchise network. Used when a client switches branches
      or when a location is closed and clients are migrated to another branch.
      Available in bulk (multiple bookings at once) via Bulk action → Network transfer.
    context:
      admin: "Network transfer"
    deprecated:
      - "franchise transfer"
    synonyms:
      - "bulk network transfer"
    translations:
      sk: "Sieťový presun"
      cz: "Síťový přesun"
    intent_keywords:
      en: ["network transfer", "transfer to another branch", "move client to another location", "franchise transfer", "bulk transfer"]
      sk: ["sieťový presun", "presun na inú pobočku", "presun klienta do inej pobočky", "franšíza presun"]
      cz: ["síťový přesun", "přesun na jinou pobočku"]
    do_not_confuse_with:
      - term: "Transfer (booking)"
        reason: >
          A standard booking transfer moves a client to a different class or programme
          within the same company. A network transfer moves bookings to a different
          company in the franchise network.
    ai_notes: >
      Network transfer requires the company to be part of a Zooza franchise network.
      If the admin cannot see the Network transfer option in Bulk actions, their account
      is not connected to a network or the feature is not enabled on their plan.
    public: false

  - id: trial
    canonical_en: "Trial"
    category: "bookings"
    definition: >
      A Zooza feature (not just a session type) that makes specific Classes
      available for prospective clients to try before committing to full enrolment.
      Trial automates the journey: trial booking → attendance → automated follow-up
      → enrolment. Status progresses: Trial Started → Trial Won (converted) or
      Trial Lost. Each Trial has its own price (can be 0), its own registration
      form, and is published separately via the widget.
    context:
      admin: "Trial"
      client: "Trial session"
      widget: "Trial session"
    deprecated:
      - "free trial session"
      - "taster session"
      - "introductory class"
    synonyms:
      - "trial session"
      - "taster"
    translations:
      sk: "Skúšobná hodina (Zooza Trial)"
      cz: "Ukázková hodina / Zkušební hodina"
      hu: "Próbaóra"
      de: "Probestunde / Schnupperstunde"
      pl: "Lekcja próbna"
      ro: "Lecție de probă"
      it: "Lezione di prova"
      fr: "Séance d'essai"
    intent_keywords:
      en: ["trial", "trial session", "free session", "taster", "try out", "introductory"]
      sk: ["skúšobná hodina", "trial", "prvá hodina zadarmo", "vyskúšať"]
      cz: ["ukázková hodina", "zkušební hodina", "trial", "zdarma hodina"]
      hu: ["próbaóra", "ingyenes óra", "próba"]
      de: ["Probestunde", "Schnupperstunde", "kostenlose Stunde", "ausprobieren"]
    do_not_confuse_with:
      - term: "Manually created trial session"
        reason: >
          Some admins create a regular Session and name it 'skúšobná hodina' /
          'zkušební hodina' without using the Zooza Trial feature at all.
          These manual sessions have no Trial status tracking, no automated
          follow-up, and no Trial funnel. When a customer mentions 'skúšobná
          hodina', always clarify: is it set up as a Zooza Trial, or is it
          a manually created session with that name?
    ai_notes: >
      CRITICAL DISAMBIGUATION: When customer says 'skúšobná hodina', 'zkušební hodina',
      'ukázková hodina', 'próbaóra', 'trial', ask:
      'Is this set up as a Zooza Trial (with its own registration form and automated
      follow-up), or did you create a regular session and name it that?'
      The answer determines entirely different instructions.
      Zooza Trial = has Trial funnel, own price, own form, automated enrollment flow.
      Manual session = regular Session with a custom name, no automation.
    public: true

  - id: auto-continuation
    canonical_en: "Auto-continuation"
    category: "bookings"
    definition: >
      A Zooza feature that automatically contacts clients before their current
      Class ends and invites them to re-enrol for the next period. The client
      receives a personalised link, goes into their Client Profile, and selects
