           "how many hours before make-up", "time limit make-up", "when can client book make-up"]
      sk: ["náhradná hodina", "náhrada", "náhradky", "náhradka", "zmeškané", "náhradný termín",
           "preložiť hodinu", "limit prihlásenia na náhradnú hodinu", "koľko hodín pred termínom",
           "časové obmedzenie náhrady", "prihlásenie na náhradnú hodinu",
           "ne ukazuje náhradky", "náhradky v blokoch"]
      cz: ["náhradní hodina", "náhrada", "zmeškané", "náhradní lekce", "přeložit hodinu",
           "limit přihlášení na náhradní hodinu", "kolik hodin před termínem",
           "časové omezení náhrady"]
      de: ["Ersatzstunde", "Ersatztermin", "Nachholtermin", "verpasste Stunde", "Nachholen"]
    do_not_confuse_with:
      - term: "Transferred make-up session"
        reason: >
          Standard make-up session = client picks from available slots within the current class period.
          Transferred make-up session = unused make-up credits carried over to the next class/period
          when the current class ends. Configured in Settings → Make-up sessions.
          In SK/CZ: 'náhrada' = standard make-up; 'prenos náhrady' = transferred make-up (inter-period).
      - term: "Custom replacement lesson"
        reason: >
          Custom replacement lesson = client proposes a specific date/time; instructor approves.
          This is a separate feature from both standard make-up and transferred make-up sessions.
      - term: "Free credits"
        reason: >
          Make-up sessions arise from cancellations (attendance logic).
          Free credits are an allowance granted on a booking (pricing/access logic).
          Some users incorrectly call make-ups 'free sessions' — clarify if needed.
      - term: "Billable session"
        reason: >
          Billable sessions are a pricing calculation setting.
          Make-up sessions are an attendance management feature.
          Do not mix these when answering attendance questions.
    ai_notes: >
      If customer asks about: missed sessions, cancellations, replacement lessons, making up
      a class, attending instead on another day → treat as make-up session / attendance topic.
      Only discuss Billable sessions if customer explicitly asks about pricing calculation settings.
    public: true

