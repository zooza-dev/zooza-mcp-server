        reason: >
          Standard make-up session = client picks a slot within the current class period.
          Transferred make-up session = unused credits carried into the NEXT period/class after the current class ends.
          Both are configured in Settings → Make-up sessions.
      - term: "Custom replacement lesson"
        reason: >
          Custom replacement = client proposes a specific date/time, instructor approves.
          Transferred make-up = automatic carry-over of unused credits between billing periods.
    ai_notes: >
      When a SK/CZ customer says 'prenos náhrady', they almost certainly mean the
