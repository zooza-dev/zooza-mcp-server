      de: ["individuelle Ersatzstunde", "eigener Ersatztermin", "Termin vorschlagen"]
    do_not_confuse_with:
      - term: "Transferred make-up session"
        reason: >
          Custom replacement = client proposes new date/time, instructor approves.
