# ──────────────────────────────────────────────
# ENTITY MISATTRIBUTION PATTERNS (AI use only)
# ──────────────────────────────────────────────
# People often name the wrong entity. These patterns map natural language
# to the correct technical entity and action.

entity_misattribution:

  - pattern: "add a new client / pridať klienta / adăuga un client / ügyfél hozzáadása"
    actual_entity: "Booking (creates Client automatically)"
    actual_action: "Create booking → New client step"
    clarification: >
      There is no standalone 'Add client' button in Zooza.
      Client records are created automatically when a booking is made.
      To add a new client manually:
      1. Go to Bookings → Create booking.
      2. At the 'Choose the client' step, select 'New client'.
      3. Enter name, surname, email (required), and phone.
      4. Complete the booking.
      If only the client profile is needed (no active booking), create the booking
      for any class and delete the booking afterwards — the client profile remains.
      Note: the booking form has multiple steps (Choose class → Choose the client →
      details). 'New client' appears at the 'Choose the client' step, not the first step.
    intent_keywords:
      en: ["add client", "add new client", "create client", "no add client button", "how to add a client"]
      sk: ["pridať klienta", "vytvoriť klienta", "ako pridať klienta", "nový klient"]
      cz: ["přidat klienta", "vytvořit klienta", "jak přidat klienta", "nový klient"]
      ro: ["adaug un client", "adăuga un client", "cum adaug client", "client nou"]
      hu: ["ügyfél hozzáadása", "új ügyfél", "hogyan adjak hozzá ügyfelet"]

  - pattern: "copy a client / kopírovať klienta"
    actual_entity: "Booking"
    actual_action: "Copy"
    clarification: "Do you want to copy the booking/registration to another class?"
    intent_keywords:
      en: ["copy client", "copy a client", "copy the client"]
      sk: ["kopírovať klienta", "skopírovať klienta"]

  - pattern: "move a child / presunúť dieťa / move a client"
    actual_entity: "Booking"
    actual_action: "Transfer"
    clarification: "Do you want to move the registration to another class?"
    intent_keywords:
      en: ["move child", "move my child", "move client", "move a client"]
      sk: ["presunúť dieťa", "prehodiť dieťa", "presunúť klienta", "prehodiť klienta"]
      de: ["Kind verschieben", "Kunde verschieben", "umbuchen"]

  - pattern: "add client to another group / pridať klienta do inej skupiny"
    actual_entity: "Booking"
    actual_action: "Copy"
    clarification: "Do you want to copy the booking so the client is enrolled in both classes?"
    intent_keywords:
      en: ["add to another group", "add client to another class", "enrol in two groups"]
      sk: ["pridať do inej skupiny", "zaradiť do ďalšej skupiny", "prihlásiť aj do inej skupiny"]

  - pattern: "cancel a client / zrušiť klienta"
    actual_entity: "Booking"
    actual_action: "Cancel booking"
    clarification: "Do you want to cancel the client's booking/registration?"
    intent_keywords:
      en: ["cancel client", "cancel the client", "remove client from class"]
      sk: ["zrušiť klienta", "odstrániť klienta zo skupiny", "odhlásiť klienta"]

  - pattern: "delete a client / vymazať klienta"
    actual_entity: "Booking or Client"
    actual_action: "Clarify"
    clarification: >
      Ask: 'Do you want to cancel the booking (remove from class) or permanently
      delete the client record?' These are different actions.
    intent_keywords:
      en: ["delete client", "remove client", "delete the client"]
      sk: ["vymazať klienta", "zmazať klienta", "odstrániť klienta"]

  - pattern: "give a client a free session / dať klientovi termín zadarmo"
    actual_entity: "Booking"
    actual_action: "Free credits or Make-up session — clarify"
    clarification: >
      Ask: 'Is this a replacement for a missed session (make-up) or an extra
      session as a gift/allowance (free credits)?' These are managed differently.
    intent_keywords:
      en: ["free session", "free lesson", "give free class", "complimentary session"]
      sk: ["dať termín zadarmo", "bezplatný termín", "hodina zadarmo", "voľný termín"]

  - pattern: "Courses = Programmes / Groups = Classes / Lessons = Sessions (RO + legacy EN navigation labels)"
    actual_entity: "Programme / Class / Session"
    actual_action: "Map to canonical hierarchy: Programme → Class → Session"
    clarification: >
      In some Zooza market versions and legacy UI states, the navigation labels differ:
      - Romanian app: Activities menu shows 'Cursuri' (Courses), 'Grupe' (Groups), 'Lecții' (Lessons/Events).
      - Legacy English: some users see 'Courses', 'Groups', 'Lessons/Events' in the Activities menu
        instead of 'Programmes', 'Classes', 'Sessions'.
      When a user says they see "Courses" and not "Programmes", or "Groups" instead of "Classes",
      they are in the same feature area — just a different UI label.
      Always respond to the feature they are asking about, using the canonical English terms.
      If AI guidance uses 'Programmes → New Programme', explain that in their UI this may appear
      as 'Courses → New Course' (or equivalent). Mapping:
        Courses / Cursuri     → Programmes
        Groups / Grupe        → Classes
        Lessons / Lecții      → Sessions
        Events / Evenímente   → Sessions (one-off)
    intent_keywords:
      en: ["I don't see Programmes", "only see Courses", "no Programmes menu",
           "see Courses not Programmes", "Courses Groups Lessons", "Activities shows courses groups"]
      ro: ["cursuri", "grupe", "lecții", "evenimente", "activități"]

  - pattern: "delete/remove/zmazať/vymazať programme/kurz/program/curs/kurzus"
    actual_entity: "Programme"
    actual_action: "Archive (or request deletion from support)"
    clarification: >
      Programmes cannot be deleted directly in the app.
      Archive hides the programme from the active list but keeps all data.
      Permanent deletion is only possible for programmes with no bookings and no
      classes, and must be requested from the support team with the programme ID.
      Ask: 'Do you want to archive it (hide from active list) or permanently
      remove it (requires no bookings, contact support)?'
    intent_keywords:
      en: ["delete programme", "remove programme", "delete course", "remove course"]
      sk: ["zmazať program", "vymazať program", "zmazať kurz", "odstrániť kurz"]
      cz: ["smazat kurz", "odstranit kurz", "vymazat kurz"]
      ro: ["șterge curs", "elimina curs"]
      hu: ["törölni kurzus", "törölni program", "kurzust törölni"]

  - pattern: "delete/remove a group / törölni group / zmazať skupinu"
    actual_entity: "Class"
    actual_action: "Archive Class (or delete if no bookings)"
    clarification: >
      'Group' is a deprecated term for Class. When a customer says 'delete a group',
      they mean delete/archive a Class. A Class cannot be deleted if it has active
      bookings — it must be archived first or bookings reassigned.
    intent_keywords:
