  - pattern: "remove location from course/class / odstrániť lokáciu z kurzu"
    actual_entity: "Class (Venue assignment)"
    actual_action: "Assign a placeholder Venue — Venue cannot be left blank"
    clarification: >
      A Class always requires a Venue — it cannot be left empty.
      The correct solution is to create a placeholder/phantom Venue in
      Settings → Locations (e.g. 'Online', 'TBD', or leave the name neutral)
      and assign it to the Class. Whatever name is set there will be displayed.
      You cannot 'remove' a venue; you replace it with a neutral placeholder.
      Never suggest deleting the Venue from Settings if it is used elsewhere.
    intent_keywords:
      en: ["remove location", "delete location from course", "remove venue", "no location", "clear location"]
      sk: ["odstrániť lokáciu", "zmazať miesto", "bez lokácie", "odstrániť miesto z kurzu"]
      cz: ["odebrat lokaci", "smazat místo", "bez místa", "odstranit lokaci z kurzu"]
      hu: ["helyszín eltávolítása", "helyszín törlése", "hely törlése kurzusból"]

  - pattern: "change trial/ukázková hodina price to 0 / zmeniť cenu skúšobnej hodiny na 0"
    actual_entity: "Class price vs. Programme price"
    actual_action: "Clarify — setting 0 at Class level is treated as 'not set', falls back to Programme price"
    clarification: >
      Pricing hierarchy:
      - If price is set at Class level (any non-zero value) → Class price OVERRIDES Programme price.
      - If price is NOT set at Programme → Class price is used.
      - EDGE CASE: Setting price to 0 at Class level is treated as 'not set' (empty),
        so the system falls back to the Programme price. You cannot make a class free
        by setting 0 at Class level if the Programme has a price.
      Three solutions to get price 0 on a specific class:
      1. Set price to 0 at Programme level — then manage all pricing differences at Class level.
      2. Move the Class into a separate Programme that has no price set, and set 0 at Class level.
      3. Use the Zooza Trial feature — Trials have their own independent price (can be 0),
         fully separate from Programme pricing.
      Ask: 'Is this class meant to be a Zooza Trial, or a regular class you want free?'
    intent_keywords:
      en: ["trial price", "change price to 0", "free trial", "set price zero", "trial session price"]
      sk: ["cena skúšobnej hodiny", "zmeniť cenu na 0", "zadarmo skúšobná", "nulová cena"]
      cz: ["cena ukázkové hodiny", "změnit cenu na 0", "zkušební hodina zadarmo", "nulová cena"]

  - pattern: "skúšobná hodina / zkušební hodina / ukázková hodina — ambiguous"
    actual_entity: "Trial (feature) OR manually created Session"
    actual_action: "Clarify before answering"
    clarification: >
      Ask: 'Is this set up as a Zooza Trial (with its own registration form and
      automated follow-up to enrolment), or did you create a regular session and
      name it skúšobná/zkušební hodina?'
      These are entirely different: Zooza Trial has automation; manual session does not.
    intent_keywords:
