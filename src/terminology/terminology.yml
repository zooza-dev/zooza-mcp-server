  - id: cancel-vs-delete
    canonical_en: "Cancel vs. Archive vs. Delete (Trash)"
    category: "bookings"
    definition: >
      Three distinct actions that customers often confuse by using the word 'vymazať'
      (SK) or 'smazat' (CZ) for all of them. Cancel = deactivates a registration,
      record stays visible. Archive = deactivates a programme/class, not deleted.
      Delete = moves to Trash, recoverable within 30 days. Permanently removed = gone
      after 30 days or hard-deleted.
    context:
      admin: "Cancel / Archive / Delete"
    translations:
      sk: "Zrušiť / Archivovať / Vymazať (Koš)"
      cz: "Zrušit / Archivovat / Smazat (Koš)"
    intent_keywords:
      en: ["cancel registration", "delete registration", "archive programme", "trash", "restore", "undo delete"]
      sk: ["vymazať registráciu", "zmazať registráciu", "zrušiť registráciu", "stornovať", "storno", "vymazať kurz",
