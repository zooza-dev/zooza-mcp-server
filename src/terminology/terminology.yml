    category: "attendance"
    definition: >
      A replacement session a client can attend after cancelling a scheduled
      session in advance (before the cancellation deadline). The make-up credit
      is generated automatically on cancellation. The client selects from
      available slots in any compatible class that has capacity.
    context:
      admin: "Make-up session"
