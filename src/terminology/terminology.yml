          it collects payments directly from clients' bank accounts (mandate-based).
          As a bank account data provider (open banking), it reads transactions arriving
          in the company's own bank account. Inbound payments use the bank data role —
          the client still pays by normal bank transfer; GoCardless only detects it.
      - term: "Payment plan / scheduled payment"
        reason: >
          A scheduled payment is a debt entry created by Zooza's payment schedule.
          An inbound payment is the actual money arriving from the bank. They are
          matched together by the pairing process.
